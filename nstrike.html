<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NStrike - NStrike Studios</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    h1 {
        text-transform: uppercase;
    }
        .stats h2 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .stats-container {
            display: flex;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .stat-box {
            background: rgb(40, 40, 40);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 200px;
        }

        .icon {
            font-size: 50px;
            color: #0088cc;
        }

        .counter {
            color: #ffffff;
            font-size: 2em;
            font-weight: bold;
            display: block;
            margin: 10px 0;
        }

        .stat-box p {
            font-size: 1.2em;
            color: #c2c2c2;
        }

    button {
        font-size: 25px;
    }

    .heading {
        background: #007fff;
    }
</style>
<body>
    <div id="header"></div>

    <section style="background: url('assets/games/nstrike-hero.png') center/cover no-repeat;" class="hero">
        <div class="overlay">
            
        </div>
    </section>
    <br>
    <section class="screenshots">
        <h1>Step into the Action!</h1>
        <p>Experience the ultimate gaming adventure with NStrike.</p>
    </section>
    <br>
    <section class="stats">
        <div class="heading">Statistics</div>
        <div class="stats-container">
            <div class="stat-box">
                <i class="icon"><img src="assets/icon/people-50x50.png" alt="people" height="50"></i>
                <span class="counter" data-target="354">0</span>
                <p>Visits</p>
            </div>

            <div class="stat-box">
                <i class="icon"><img src="assets/icon/thumb-up-50x50.png" alt="thumb up" height="50"></i>
                <span class="counter" data-target="4">0</span>
                <p>Likes</p>
            </div>
            
            <div class="stat-box">
                <i class="icon"><img src="assets/icon/star-50x50.png" alt="star" height="50"></i>
                <span class="counter" data-target="2">0</span>
                <p>Favorites</p>
            </div>
        </div>
    </section>
    <br>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const counters = document.querySelectorAll(".counter");

            counters.forEach(counter => {
                counter.innerText = "0";
                const updateCounter = () => {
                    const target = +counter.getAttribute("data-target");
                    const current = +counter.innerText;
                    const increment = target / 100; // ค่อยๆ เพิ่มทีละนิด

                    if (current < target) {
                        counter.innerText = Math.ceil(current + increment);
                        setTimeout(updateCounter, 40); // เพิ่มค่าทุก 20ms
                    } else {
                        counter.innerText = target; // ตั้งค่าให้เป็นค่าที่ต้องการ
                    }
                };

                updateCounter();
            });
        });
    </script>

    <section class="play">
        <div class="heading">Play</div>
            <a href=""><button><img src="assets/icon/roblox-icon.png" height="25" alt="Roblox"> Play Now</button></a>
    </section>
    
    <br>
    <div id="footer"></div>
    <script src="load.js"></script>
</body>
</html>
